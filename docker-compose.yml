version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD:-venombot123}
      POSTGRES_DB: venombot
    volumes:
      - timescale_data:/var/lib/postgresql/data
    command: -p 5432 -c max_connections=50
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: always

  backend:
    build: ./backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-venombot123}@timescaledb:5432/venombot
      - REDIS_URL=redis://redis:6379
    depends_on:
      - timescaledb
      - redis
    ports: ["8000:8000"]
    restart: always

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports: ["8080:80"]
    restart: always

  grafana:
    image: grafana/grafana:latest
    ports: ["4000:3000"]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    restart: always

volumes:
  timescale_data:
  redis_data:
  grafana_data:
